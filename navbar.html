<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: #1a1a1a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 40px;
      z-index: 100;
    }

    .logo {
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      text-decoration: none;
      position: relative;
    }

    .logo::after {
      content: "";
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1.5px;
      background: #fff;
      transition: width 0.25s ease;
    }

    .logo:hover::after {
      width: 100%;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 36px;
    }

    .nav-links a {
      color: #999;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.2px;
      position: relative;
      transition: color 0.2s ease;
    }

    .nav-links a::after {
      content: "";
      position: absolute;
      bottom: -3px;
      left: 0;
      width: 0;
      height: 1.5px;
      background: #fff;
      transition: width 0.25s ease;
    }

    .nav-links a:hover {
      color: #fff;
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    .nav-links a.active {
      color: #fff;
    }

    .nav-links a.active::after {
      width: 100%;
      background: #fff;
      opacity: 0.4;
    }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="logo">Gui</a>
    <ul class="nav-links">
      <li><a href="#" class="active">Home</a></li>
      <li><a href="#">Work</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

</body>
</html>
